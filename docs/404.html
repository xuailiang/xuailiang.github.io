      document.documentElement.classList.add("js");
      
      // Custom cursor with delay
      const cursor = document.getElementById("cursor");
      let mouseX = 0, mouseY = 0;
      let cursorX = 0, cursorY = 0;
      
      document.addEventListener("mousemove", (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
      });
      
      function animateCursor() {
        // Lerp for smooth delay
        cursorX += (mouseX - cursorX) * 0.12;
        cursorY += (mouseY - cursorY) * 0.12;
        cursor.style.left = cursorX + "px";
        cursor.style.top = cursorY + "px";
        requestAnimationFrame(animateCursor);
      }
      animateCursor();
      
      // Hover effects on interactive elements
      const interactives = document.querySelectorAll('a, button, .work-card, .photo-card');
      interactives.forEach(el => {
        el.addEventListener('mouseenter', () => cursor.classList.add('hovering'));
        el.addEventListener('mouseleave', () => cursor.classList.remove('hovering'));
      });
      
      // Line-by-line reveal for paragraphs
      document.querySelectorAll('.reveal-lines').forEach(el => {
        const text = el.textContent;
        el.innerHTML = '';
        const words = text.split(/(\s+)/);
        let lineHTML = '';
        let lineIndex = 0;
        
        words.forEach((word, i) => {
          lineHTML += `<span class="reveal-word" style="--delay: ${lineIndex * 30}ms">${word}</span>`;
          if (word.includes(' ') || word.includes('\n')) {
            lineIndex++;
          }
        });
        el.innerHTML = lineHTML;
        
        // Observe and animate each word
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              entry.target.classList.add('is-visible');
            }
          });
        }, { threshold: 0.1 });
        
        el.querySelectorAll('.reveal-word').forEach((span, i) => {
          span.style.opacity = '0';
          span.style.transform = 'translateY(8px)';
          span.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
          span.style.transitionDelay = span.style.getPropertyValue('--delay');
          observer.observe(span);
        });
        
        // Trigger when parent enters view
        const parentObserver = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              el.querySelectorAll('.reveal-word').forEach((span, i) => {
                setTimeout(() => {
                  span.style.opacity = '1';
                  span.style.transform = 'translateY(0)';
                }, i * 30);
              });
              parentObserver.unobserve(entry.target);
            }
          });
        }, { threshold: 0.1 });
        parentObserver.observe(el);
      });
      
      const observer = new IntersectionObserver(
        (entries) => {
          for (const entry of entries) {
            if (entry.isIntersecting) {
              entry.target.classList.add("is-visible");
              observer.unobserve(entry.target);
            }
          }
        },
        { threshold: 0.2, rootMargin: "0px 0px -10% 0px" },
      );

      document.querySelectorAll("[data-reveal]").forEach((element) => observer.observe(element));
    </script> </body> </html>
